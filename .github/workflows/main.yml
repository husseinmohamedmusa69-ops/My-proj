
name: Build Android APK
on:
  push:
    branches: [ "رئيسي" ] # تم ضبطه على اسم فرعك الحالي (رئيسي)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Android Project
        run: |
          cordova create my-app com.example.myapp MyApp
          cd my-app
          cordova platform add android
          # نسخ ملفات موقعك إلى مجلد الـ www الخاص بكوردوفا
          rm -rf www/*
          cp -r ../* www/ || true
          # بناء ملف الـ APK
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-app-debug.apk
          path: my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
